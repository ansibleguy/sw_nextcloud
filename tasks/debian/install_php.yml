---

- name: NextCloud | Debian | Install | PHP | Packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - "php{{ NC_HC.packages.php_version }}"
    - "{{ NC_HC.packages.php_base }}"

- name: NextCloud | Debian | Install | PHP | Required PHP Modules
  ansible.builtin.apt:
    name: "{{ NC_HC.packages.php_modules }}"
    state: present

- name: NextCloud | Debian | Install | PHP | Optional PHP Modules
  ansible.builtin.apt:
    name: "{{ NC_HC.packages.php_modules_optional }}"
    state: present
  when: NC_CONFIG.php_optional

- name: NextCloud | Debian | Install | PHP | Enabling PHP-FPM
  ansible.builtin.systemd:
    name: "php{{ NC_HC.php_version }}-fpm.service"
    enabled: true
    daemon_reload: yes
