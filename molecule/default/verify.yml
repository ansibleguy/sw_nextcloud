---

- name: Verify
  hosts: grp_tester
  gather_facts: false
  tasks:
  - name: Checking if nextcloud web-service is reachable
    ansible.builtin.uri:
      url: 'https://192.168.1.2'
      return_content: yes
      validate_certs: false
    register: page
    failed_when: "'NextCloud' not in page.content"
