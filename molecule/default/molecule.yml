---

dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: test-ag-nc-tester
    docker_networks:
      - name: 'test-ag-nc'
        ipam_config:
          - subnet: '192.168.1.0/24'
            gateway: '192.168.1.254'
    networks:
      - name: 'test-ag-nc'
        ipv4_address: '192.168.1.1'
    groups: [grp_tester]
    etc_hosts: {nextcloud.test.ansibleguy.net: '192.168.1.2'}

    # docker config
    docker_host: 'tcp://molecule-docker.local:2375'
    purge_networks: true
    image: 'debian:11-slim'
    dockerfile: 'Dockerfile_debian11_systemd.j2'
    build_image: yes
    tmpfs: [ '/tmp', '/run', '/run/lock' ]
    privileged: true
    command: '/sbin/init'

  - name: test-ag-nc-1
    networks:
      - name: 'test-ag-nc'
        ipv4_address: '192.168.1.2'
    groups: [grp_targets]

    # docker config
    docker_host: 'tcp://molecule-docker.local:2375'
    purge_networks: true
    image: 'debian:11-slim'
    dockerfile: 'Dockerfile_debian11_systemd.j2'
    build_image: yes
    tmpfs: [ '/tmp', '/run', '/run/lock' ]
    privileged: true
    command: '/sbin/init'

provisioner:
  name: ansible
verifier:
  name: ansible
scenario:
  name: default
  test_sequence:
    - lint
    - destroy
    - syntax
    - create
    - converge
    - verify  # MUST NOT make changes
    - idempotence
    - check
    - destroy
