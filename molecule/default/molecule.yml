---

references:
  docker:
    all: &docker_all
      docker_host: 'tcp://172.17.0.50:2375'
      # docker_host: 'unix://var/run/docker.sock'  # localhost
      purge_networks: true
      image: 'debian:11-slim'
      # for docker systemd config see: https://serverfault.com/questions/1053187/systemd-fails-to-run-in-a-docker-container-when-using-cgroupv2-cgroupns-priva
      dockerfile: 'Dockerfile.j2'
      build_image: yes
      tmpfs: ['/tmp', '/run', '/run/lock']
      privileged: true
      command: '/sbin/init'

dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: test-ag-nc-checker
    docker_networks:
      - name: 'test-ag-nc'
        ipam_config:
          - subnet: '192.168.0.0/24'
            gateway: '192.168.0.254'
      networks:
        - name: 'test-ag-nc'
          ipv4_address: '192.168.0.1'
    <<: *docker_all
  - name: test-ag-nc-1
    networks:
      - name: 'test-ag-nc'
        ipv4_address: '192.168.0.20'
    <<: *docker_all

provisioner:
  name: ansible
verifier:
  name: ansible
