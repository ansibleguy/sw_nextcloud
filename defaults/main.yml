---

# see: https://docs.nextcloud.com/server/latest/admin_manual/installation/source_installation.html

random_pwd_length: '50'  # must be string-type
tmp_pwd_file_prefix: '/tmp/.ansibleguy.sw_nextcloud'

NC_HC:  # 'hardcoded' defaults => should not be changed
  packages:
    base: ['libxml2', 'ffmpeg', 'gpg', 'acl']  # NOTE: 'acl' needed to let ansible become www-data
    php_base: ['libapache2-mod-php']
    php_modules: [
       # libxml,openssl,session,zlib = enabled by default
       # json = sub-package of fpm
       # simplexml, xmlreader, xmlwriter = xml
      'fpm', 'ctype', 'curl', 'dom', 'gd', 'mbstring', 'posix', 'xml', 'zip',
      # db connection
      'pdo-mysql',
      # recommended
      'fileinfo', 'bz2', 'intl',
      # required for features
      'ldap', 'smbclient', 'ftp', 'imap', 'bcmath', 'gmp',
      # enhance performance
      'redis', 'opcache',
    ]
    php_modules_optional: [
      'phar', 'imagick', 'exif',
    ]
    redis: ['redis-server']
    security: ['fail2ban']
    tools: ['ncdu', 'iotop', 'iftop']  # disk-space & i/o troubleshooting tools one might need in combination with nextcloud

  nc_secure_settings:
    session_lifetime: 21600  # 6h
    token_auth_enforced: 'true'
    token_auth_activity_update: 60

  user: 'www-data'
  group: 'www-data'
  php:
    version: '8.0'
    repo_key: 'https://packages.sury.org/php/apt.gpg'
    repo: "deb https://packages.sury.org/php/ {{ ansible_distribution_release }} main"
    path_log: '/var/log/php'

  nc:
    download_url: 'https://download.nextcloud.com/server/releases'

  apache:
    modules:
      present: ['ssl', 'headers', 'rewrite', 'http2', 'env', 'dir', 'mime']

    security:
      restrict_methods: false

    headers:
      'Referrer-Policy': 'no-referrer'
      'X-Robots-Tag': 'none'

default_nextcloud:
  php_optional: false  # install optional php-modules
  tools: false  # install admin-tools for disk-space & i/o troubleshooting
  enhanced_security: false  # enable fail2ban and some harder nextcloud settings
  version: '24.0.3'  # be aware: dependencies may differ between major versions..
  upgrade: false  # will download current version and install it

  manage:
    db: true
    webserver: true
    php: true
    redis: true  # better performance

  config:
    path_data: '/var/data/nextcloud'
    path_web: '/var/www/nextcloud'
    admin_user: 'admin'
    # default => random pwd will be generated
    admin_pwd: "{{ lookup('password', tmp_pwd_file_prefix + '_nc_adm chars=ascii_letters,digits length=' + random_pwd_length) }}"

  settings:  # see: https://docs.nextcloud.com/server/latest/admin_manual/configuration_server/config_sample_php_parameters.html
    log_type: 'syslog'
    syslog_tag: 'NextCloud'
    logfile: ''  # syslog
    loglevel: 2  # 0 = debug, 1 = info, 2 = warn, 3 = error, 4 = fatal
    # default_language:
    # default_locale:
    # defaultapp:
    # mail_domain:
    # mail_from_address:
    # mail_smtphost:
    # mail_smtpport:
    # mail_smtpsecure:
    # mail_smtpauth:
    # mail_smtpname:  # smtp user
    # mail_smtppassword:
    # overwrite.cli.url: 'https://your-domain.org/'  # prettify urls
    # htaccess.RewriteBase: '/'

  php:
    # settings will be replaced or appended
    srv:
      post_max_size: '100G'
      upload_max_filesize: '100G'
      timezone: 'Europe/Vienna'
      memory_limit: '512M'  # if you have more RAM available => you should increase this value! or set to '-1' to NOT LIMIT it at all
      'apc.enable_cli': 1
    fpm:
      listen: '127.0.0.1:9000'
    fpm_pool: {}
    cli: {}  # settings used by nextcloud background tasks (cron jobs)

  apache:
    # for more info see: https://github.com/ansibleguy/infra_apache
    port_plain: 80
    port_ssl: 443
    # domain:
    # aliases: []
    # ip:

    ssl:  # see: https://github.com/ansibleguy/infra_certs
      mode: 'ca'  # existing/selfsigned/ca/letsencrypt
      cert:
        name:
        cn: 'NextCloud Certificate'
        org: 'AnsibleGuy'

    config:
      LimitRequestBody: 0  # unlimited body size for uploads; is limited by php

    config_additions:
      - '<Directory /var/www/nextcloud/>'  # todo: change with 'path_web'; maybe implement some placeholder at apache-role-level
      - '  Require all granted'
      - '  AllowOverride All'
      - '  Options FollowSymLinks MultiViews'
      - '  <IfModule mod_dav.c>'
      - '    Dav off'
      - '  </IfModule>'
      - '</Directory>'

    security:
      restrict_methods: false  # nextCloud uses webDAV

  database:
    name: 'nextcloud'
    user: 'nextcloud'
    # default => random pwd will be generated
    pwd: "{{ lookup('password', tmp_pwd_file_prefix + '_nc_mysql chars=ascii_letters,digits length=' + random_pwd_length) }}"

    update_password: 'always'  # or 'on_create'
    settings:
      innodb_log_file_size: '256M'
      wait_timeout: 600
      transaction-isolation: 'READ-COMMITTED'
      binlog_format: 'ROW'

    socket: '/run/mysqld/mysqld_nextcloud.sock'
    # ONLY CHANGE IF DB IS NOT MANAGED BY ROLE!
    type: 'mysql'
    host: 'localhost'
    # port: 3307

  redis:
    port: 6379
    host: 'localhost'
    # default => random pwd will be generated
    pwd: "{{ lookup('password', tmp_pwd_file_prefix + '_redis chars=ascii_letters,digits length=' + random_pwd_length) }}"
    settings: {}  # setting overrides for redis.conf

  fail2ban:
    path_log: '/var/log/fail2ban'

NC_CONFIG: "{{ default_nextcloud | combine(nextcloud, recursive=true) }}"

NC_MARIADB_INSTANCE: "{{ {
  'dbs': {
    NC_CONFIG.database.name: {
      'encoding': 'utf8mb4',
      'collation': 'utf8mb4_general_ci'
    },
  },
  'users': {
    NC_CONFIG.database.user: {
      'priv': NC_CONFIG.database.name + '.*:ALL',
      'pwd': NC_CONFIG.database.pwd,
      'update_pwd': NC_CONFIG.database.update_password
    },
  },
  'settings': NC_CONFIG.database.settings,
  'socket': NC_CONFIG.database.socket
} }}"  # DO NOT CHANGE!

SETTING_GRAYLIST: ['redis', 'dbtype', 'dbname', 'dbhost', 'dbuser', 'dbpassword', 'trusted_domains']
NONE_VALUES: [none, '', ' ']
no_prompts: false  # to run the role non-interactively

NC_PHP_DB_HOST: "{% if NC_CONFIG.database.host == 'localhost' %}localhost:{{ NC_CONFIG.database.socket }}{% else %}{{ NC_CONFIG.database.host }}{% if 'port' in NC_CONFIG.database %}:{{ NC_CONFIG.database.port }}{% endif %}{% endif %}"
nc_apache_path:
  serve:
    path: "{{ NC_CONFIG.config.path_web }}"

nc_installed: false
